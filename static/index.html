<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictive Demand Forecasting</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-container"></div>
    <div class="glass-panel">
        <div class="header">
            <h1 class="gradient-text">Demand Forecaster</h1>
            <p>Predict optimal future inventory levels seamlessly using our advanced time-series engine.</p>
        </div>
        
        <div class="month-selector-container">
            <label for="month_select">Forecast Month:</label>
            <select id="month_select" class="glass-select"></select>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="single-tab">Single Forecast</button>
            <button class="tab-btn" data-tab="top-tab">Top Forecasts</button>
        </div>

        <!-- Single Forecast Tab -->
        <div id="single-tab" class="tab-content active">
            <form id="predict-form" class="form-container">
                <div class="input-group">
                    <label for="shop_id">Shop ID</label>
                    <input type="number" id="shop_id" name="shop_id" placeholder="e.g. 5" required>
                </div>
                <div class="input-group">
                    <label for="item_id">Item ID</label>
                    <input type="number" id="item_id" name="item_id" placeholder="e.g. 5037" required>
                </div>
                <button type="submit" id="submit-btn">
                    <span class="btn-text">Generate Forecast</span>
                    <span class="loader hidden"></span>
                </button>
            </form>

            <div id="result-card" class="result-card hidden">
                <p class="result-label">Predicted 30-Day Volume</p>
                <h2 id="forecast-value">0.00</h2>
            </div>
        </div>

        <!-- Top Forecasts Tab -->
        <div id="top-tab" class="tab-content">
            <button id="generate-top-btn" class="secondary-btn">
                <span class="btn-text">Load Top 100 Forecasts</span>
                <span class="loader hidden"></span>
            </button>
            
            <div class="table-container hidden" id="top-table-container">
                <table class="glass-table">
                    <thead>
                        <tr>
                            <th data-sort="shop_id">Shop ID <span class="sort-icon"></span></th>
                            <th data-sort="item_id">Item ID <span class="sort-icon"></span></th>
                            <th data-sort="forecast">30-Day Volume <span class="sort-icon desc">▼</span></th>
                        </tr>
                    </thead>
                    <tbody id="top-table-body">
                        <!-- Rows populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
